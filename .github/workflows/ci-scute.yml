name: Scute / CI

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "scripts/scute/**"
      - ".github/workflows/ci-scute.yml"
      - ".scute.yml"
  pull_request:
    paths:
      - "crates/**"
      - "scripts/scute/**"
      - ".github/workflows/ci-scute.yml"
      - ".scute.yml"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SCUTE: cargo run -q --

jobs:
  ci:
    name: Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup show
        working-directory: crates

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates

      - run: ./scripts/scute/ci.sh

  code-similarity:
    name: Code duplication
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        run: rustup show
        working-directory: crates

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates

      - name: Check for duplication in changed files
        env:
          BASE: origin/${{ github.base_ref }}
        run: git diff --name-only --relative $BASE...HEAD -- '*.rs' | $SCUTE check code-similarity
        working-directory: crates

  code-complexity:
    name: Code complexity
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        run: rustup show
        working-directory: crates

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates

      - name: Check complexity of changed files
        env:
          BASE: origin/${{ github.base_ref }}
        run: git diff --name-only --relative $BASE...HEAD -- '*.rs' | $SCUTE check code-complexity
        working-directory: crates
