[package]
name = "scute-cli"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[[bin]]
name = "scute"
path = "src/main.rs"

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.5.60", features = ["derive"] }
scute-core = { path = "../scute-core" }
serde_json = "1"

[dev-dependencies]
assert_cmd = "2"
