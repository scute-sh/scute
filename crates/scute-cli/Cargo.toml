[package]
name = "scute-cli"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[[bin]]
name = "scute"
path = "src/main.rs"

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.5.60", features = ["derive"] }
scute-core = { path = "../scute-core" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1"
serde_yml = "0.0.12"

[dev-dependencies]
scute-test-utils = { path = "../scute-test-utils" }
