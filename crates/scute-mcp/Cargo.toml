[package]
name = "scute-mcp"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[[bin]]
name = "scute-mcp"
path = "src/main.rs"

[dependencies]
rmcp = { version = "0.17", features = ["server", "transport-io"] }
scute-core = { path = "../scute-core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }

[dev-dependencies]
scute-test-utils = { path = "../scute-test-utils" }
test-case = "3"
